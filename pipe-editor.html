<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pipe editor — Marzy</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/tokens.css" />
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font-body);
        color: var(--color-ink);
        background: var(--color-paper);
        display: flex;
        flex-direction: column;
      }

      /* Toolbar */
      .ed-bar {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        flex-wrap: wrap;
        padding: var(--space-3) var(--space-5);
        background: var(--color-surface);
        border-bottom: var(--border);
      }
      .ed-brand {
        font-family: var(--font-display);
        font-weight: var(--weight-bold);
        font-size: var(--text-18);
        letter-spacing: var(--tracking-tight);
      }
      .ed-group { display: inline-flex; gap: var(--space-2); align-items: center; }
      .ed-spacer { flex: 1; }
      .ed-btn {
        font-family: var(--font-body);
        font-size: var(--text-small);
        font-weight: var(--weight-medium);
        color: var(--color-ink-2);
        background: var(--color-surface);
        border: var(--border-strong);
        border-radius: var(--radius-sm);
        height: var(--control-h);
        padding: 0 var(--control-px);
        cursor: pointer;
        transition: border-color var(--duration-base) var(--ease),
          color var(--duration-base) var(--ease);
      }
      .ed-btn:hover { border-color: var(--color-ink-2); color: var(--color-ink); }
      .ed-btn.is-active {
        background: var(--color-volt);
        border-color: var(--color-volt);
        color: #fff;
      }
      .ed-btn:focus-visible { outline: 2px solid var(--color-volt); outline-offset: 2px; }

      .ed-field {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        font-size: var(--text-13);
        color: var(--color-muted);
        white-space: nowrap;
      }
      .ed-field input[type="range"] { width: 92px; accent-color: var(--color-volt); }
      .ed-field b {
        font-weight: var(--weight-semibold);
        color: var(--color-ink);
        font-variant-numeric: tabular-nums;
        min-width: 1.4em;
        text-align: right;
      }

      /* Stage */
      .ed-stage {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-4);
        padding: var(--space-8) var(--space-5);
        overflow: auto;
      }
      .ed-canvas-wrap {
        background: var(--color-surface);
        border: var(--border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        max-width: 100%;
      }
      #board {
        display: block;
        max-width: 100%;
        height: auto;
        touch-action: none;
        cursor: crosshair;
      }
      #board.is-erasing { cursor: cell; }

      .ed-grid line { stroke: var(--color-line); stroke-width: 1; }
      .ed-node { fill: var(--color-volt); }

      /* brand pipe strokes — copied from the site so the flow matches exactly */
      .mz-pipe {
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 120 16;
        animation: mz-pipe-flow linear infinite;
        animation-play-state: paused;
      }
      #board.playing .mz-pipe { animation-play-state: running; }
      .mz-pipe-v { stroke: var(--color-volt); }
      .mz-pipe-n { stroke: var(--color-volt-300); }
      @keyframes mz-pipe-flow { to { stroke-dashoffset: -136; } }
      @media (prefers-reduced-motion: reduce) {
        #board.playing .mz-pipe { animation: none; }
      }

      .ed-hint { margin: 0; font-size: var(--text-small); color: var(--color-muted); }

      .ed-toast {
        position: fixed;
        left: 50%;
        bottom: var(--space-8);
        transform: translateX(-50%);
        background: var(--color-ink);
        color: #fff;
        font-size: var(--text-small);
        font-weight: var(--weight-medium);
        padding: var(--space-3) var(--space-5);
        border-radius: var(--radius-pill);
      }
      .ed-toast[hidden] { display: none; }
    </style>
  </head>
  <body>
    <header class="ed-bar">
      <span class="ed-brand">Pipe editor</span>
      <div class="ed-group" role="group" aria-label="Tool">
        <button class="ed-btn is-active" data-tool="draw">Draw</button>
        <button class="ed-btn" data-tool="erase">Erase</button>
      </div>
      <div class="ed-group">
        <button class="ed-btn" id="generate">Generate</button>
        <button class="ed-btn" id="clear">Clear</button>
        <button class="ed-btn" id="play" aria-pressed="true">Pause flow</button>
      </div>
      <div class="ed-group">
        <label class="ed-field">Lines <input type="range" id="lines" min="1" max="9" step="2" value="5" /><b id="linesV">5</b></label>
        <label class="ed-field">Spacing <input type="range" id="spacing" min="3" max="14" value="7" /><b id="spacingV">7</b></label>
        <label class="ed-field">Bend <input type="range" id="bend" min="0" max="17" value="15" /><b id="bendV">15</b></label>
      </div>
      <span class="ed-spacer"></span>
      <div class="ed-group">
        <button class="ed-btn" id="copySvg">Copy SVG</button>
        <button class="ed-btn" id="copyJson">Copy data</button>
      </div>
    </header>

    <main class="ed-stage">
      <div class="ed-canvas-wrap">
        <svg id="board" class="playing" aria-label="Pipe grid"></svg>
      </div>
      <p class="ed-hint">
        Draw or drag to lay a path — it renders as a parallel pipe bundle with
        rounded bends. Press Generate for a procedural one.
      </p>
    </main>

    <div class="ed-toast" id="toast" hidden></div>

    <script type="module">
      import { buildPipes } from "./components/pipe.js";

      const board = document.getElementById("board");
      const toast = document.getElementById("toast");

      const COLS = 30;
      const ROWS = 18;
      const CELL = 34;
      const W = COLS * CELL;
      const H = ROWS * CELL;

      const cells = new Set(); // "r,c"
      let tool = "draw";
      let painting = false;
      let lastKey = null;
      let lines = 5, spacing = 7, bend = 15;

      const key = (r, c) => r + "," + c;
      const has = (r, c) => cells.has(key(r, c));
      const inBounds = (r, c) => r >= 0 && c >= 0 && r < ROWS && c < COLS;
      const cx = (c) => c * CELL + CELL / 2;
      const cy = (r) => r * CELL + CELL / 2;

      function setupBoard() {
        board.setAttribute("viewBox", `0 0 ${W} ${H}`);
        board.setAttribute("width", W);
        board.setAttribute("height", H);
        let g = '<g class="ed-grid">';
        for (let c = 0; c <= COLS; c++)
          g += `<line x1="${c * CELL}" y1="0" x2="${c * CELL}" y2="${H}"/>`;
        for (let r = 0; r <= ROWS; r++)
          g += `<line x1="0" y1="${r * CELL}" x2="${W}" y2="${r * CELL}"/>`;
        g += '</g><g class="ed-pipes" id="pipes"></g>';
        board.innerHTML = g;
      }

      // ── Trace the drawn cells into polyline routes ──────────────────────
      const NB = [[-1, 0], [0, 1], [1, 0], [0, -1]];
      const adj = (r, c) =>
        NB.map(([dr, dc]) => [r + dr, c + dc]).filter(([nr, nc]) => has(nr, nc));
      const eKey = (a, b) => {
        const s1 = a[0] * COLS + a[1], s2 = b[0] * COLS + b[1];
        return s1 < s2 ? s1 + "-" + s2 : s2 + "-" + s1;
      };
      const same = (a, b) => a[0] === b[0] && a[1] === b[1];

      // Walk a route, always preferring to continue STRAIGHT — so a route
      // runs straight through junctions (crosses pass through, tees keep their
      // main line unbroken). Only turn where the path itself bends (degree 2).
      function walk(start, first, used) {
        const path = [start, first];
        used.add(eKey(start, first));
        let prev = start, cur = first;
        while (true) {
          const inDir = [cur[0] - prev[0], cur[1] - prev[1]];
          const sCell = [cur[0] + inDir[0], cur[1] + inDir[1]];
          let next = null;
          if (has(sCell[0], sCell[1]) && !used.has(eKey(cur, sCell))) {
            next = sCell; // straight continuation (through junctions)
          } else if (adj(cur[0], cur[1]).length === 2) {
            next = adj(cur[0], cur[1]).find(
              (n) => !same(n, prev) && !used.has(eKey(cur, n))
            ); // a real bend
          }
          if (!next) break;
          used.add(eKey(cur, next));
          prev = cur;
          cur = next;
          path.push(cur);
        }
        return path;
      }

      const plen = (pts) => {
        let s = 0;
        for (let i = 1; i < pts.length; i++)
          s += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
        return s;
      };

      function traceRoutes() {
        const used = new Set();
        const list = [...cells].map((k) => k.split(",").map(Number));
        const routes = [];
        const start = (r, c) =>
          adj(r, c).forEach((nb) => {
            if (!used.has(eKey([r, c], nb))) routes.push(walk([r, c], nb, used));
          });
        // 1) from endpoints → maximal straight-through routes (the through line
        //    of a tee, both arms of a cross). 2) leftover junction segments and
        //    closed loops.
        for (const [r, c] of list) if (adj(r, c).length === 1) start(r, c);
        for (const [r, c] of list) start(r, c);
        // shorter routes first so longer mains draw ON TOP — branches tee in
        // cleanly under the main pipe.
        return routes.map(toPoints).sort((a, b) => plen(a) - plen(b));
      }

      // cell path → pixel points, dropping collinear midpoints (keep bends)
      function toPoints(path) {
        const pts = path.map(([r, c]) => [cx(c), cy(r)]);
        if (pts.length <= 2) return pts;
        const out = [pts[0]];
        for (let i = 1; i < pts.length - 1; i++) {
          const a = out[out.length - 1], b = pts[i], c2 = pts[i + 1];
          const colinear =
            (a[0] === b[0] && b[0] === c2[0]) || (a[1] === b[1] && b[1] === c2[1]);
          if (!colinear) out.push(b);
        }
        out.push(pts[pts.length - 1]);
        return out;
      }

      // ── Render ──────────────────────────────────────────────────────────
      function render() {
        const layer = board.querySelector("#pipes");
        const routes = traceRoutes();
        let nodes = "";
        for (const [r, c] of [...cells].map((k) => k.split(",").map(Number))) {
          if (adj(r, c).length === 0)
            nodes += `<circle class="ed-node" cx="${cx(c)}" cy="${cy(r)}" r="${lines * spacing / 2 || 3}"/>`;
        }
        const built = routes.length
          ? buildPipes({
              routes,
              width: W,
              height: H,
              n: lines,
              spacing,
              radius: Math.max(1, bend),
              preserve: "none",
              fade: false,
            })
          : null;
        layer.replaceChildren(...(built ? [...built.childNodes] : []));
        if (nodes) layer.insertAdjacentHTML("beforeend", nodes);
      }

      // ── Painting ────────────────────────────────────────────────────────
      function cellFromEvent(e) {
        const rect = board.getBoundingClientRect();
        const scale = rect.width / W;
        return {
          r: Math.floor((e.clientY - rect.top) / scale / CELL),
          c: Math.floor((e.clientX - rect.left) / scale / CELL),
        };
      }
      function apply(r, c) {
        if (!inBounds(r, c)) return;
        const k = key(r, c);
        if (tool === "draw") {
          if (cells.has(k)) return;
          cells.add(k);
        } else {
          if (!cells.has(k)) return;
          cells.delete(k);
        }
        render();
      }
      board.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        painting = true;
        board.setPointerCapture(e.pointerId);
        const { r, c } = cellFromEvent(e);
        lastKey = key(r, c);
        apply(r, c);
      });
      board.addEventListener("pointermove", (e) => {
        if (!painting) return;
        const { r, c } = cellFromEvent(e);
        const k = key(r, c);
        if (k === lastKey) return;
        lastKey = k;
        apply(r, c);
      });
      const stop = () => { painting = false; lastKey = null; };
      board.addEventListener("pointerup", stop);
      board.addEventListener("pointercancel", stop);

      // ── Procedural generator: self-avoiding orthogonal walks with bends ──
      const rint = (n) => Math.floor(Math.random() * n);
      function generate() {
        cells.clear();
        const strokes = 1 + rint(2);
        for (let s = 0; s < strokes; s++) {
          let r = 3 + rint(ROWS - 6), c = 3 + rint(COLS - 6);
          let di = rint(4);
          const len = 18 + rint(22);
          let placed = 0, guard = 0;
          cells.add(key(r, c));
          while (placed < len && guard++ < len * 8) {
            if (Math.random() < 0.42) di = (di + (Math.random() < 0.5 ? 1 : 3)) % 4;
            const [dr, dc] = NB[di];
            const nr = r + dr, nc = c + dc;
            if (!inBounds(nr, nc) || cells.has(key(nr, nc))) {
              di = (di + 1) % 4;
              continue;
            }
            r = nr; c = nc;
            cells.add(key(r, c));
            placed++;
          }
        }
        render();
      }

      // ── Controls ────────────────────────────────────────────────────────
      document.querySelectorAll("[data-tool]").forEach((b) =>
        b.addEventListener("click", () => {
          tool = b.dataset.tool;
          document
            .querySelectorAll("[data-tool]")
            .forEach((x) => x.classList.toggle("is-active", x === b));
          board.classList.toggle("is-erasing", tool === "erase");
        })
      );
      document.getElementById("generate").addEventListener("click", generate);
      document.getElementById("clear").addEventListener("click", () => {
        cells.clear();
        render();
      });
      const play = document.getElementById("play");
      play.addEventListener("click", () => {
        const on = board.classList.toggle("playing");
        play.textContent = on ? "Pause flow" : "Play flow";
        play.setAttribute("aria-pressed", String(on));
      });

      const bindSlider = (id, set) => {
        const el = document.getElementById(id);
        const out = document.getElementById(id + "V");
        el.addEventListener("input", () => {
          set(Number(el.value));
          out.textContent = el.value;
          render();
        });
      };
      bindSlider("lines", (v) => (lines = v));
      bindSlider("spacing", (v) => (spacing = v));
      bindSlider("bend", (v) => (bend = v));

      window.addEventListener("keydown", (e) => {
        if (e.target.matches("input, textarea")) return;
        if (e.key === "d" || e.key === "e")
          document.querySelector(`[data-tool="${e.key === "d" ? "draw" : "erase"}"]`).click();
        if (e.key === "g") generate();
      });

      // ── Export ──────────────────────────────────────────────────────────
      function showToast(msg) {
        toast.textContent = msg;
        toast.hidden = false;
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => (toast.hidden = true), 1500);
      }
      async function copy(text, msg) {
        try {
          await navigator.clipboard.writeText(text);
          showToast(msg);
        } catch {
          showToast("Copy failed — clipboard blocked");
        }
      }
      document.getElementById("copySvg").addEventListener("click", () => {
        const inner = board.querySelector("#pipes").innerHTML;
        const svg =
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" fill="none">` +
          `<style>.mz-pipe{fill:none;stroke-width:2;stroke-linecap:round}.mz-pipe-v{stroke:#1b43ff}.mz-pipe-n{stroke:#8fa3ff}.ed-node{fill:#1b43ff}</style>` +
          inner +
          `</svg>`;
        copy(svg, "SVG copied to clipboard");
      });
      document.getElementById("copyJson").addEventListener("click", () => {
        copy(
          JSON.stringify({
            cols: COLS,
            rows: ROWS,
            cells: [...cells].map((k) => k.split(",").map(Number)),
          }),
          "Pipe data copied to clipboard"
        );
      });

      setupBoard();
      generate();
    </script>
  </body>
</html>
